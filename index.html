<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jakub Rząca – Email Marketing & Automation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.383.0/umd/lucide.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { Mail, Linkedin, Calendar, ChevronRight, Sparkles, Target, TrendingUp, PenTool, ArrowUp, CheckCircle, AlertCircle } = lucide;

function Portfolio() {
  const [activeSection, setActiveSection] = useState('hero');
  const [isMenuOpen, setIsMenuOpen] = useState(false);
  const [showScrollTop, setShowScrollTop] = useState(false);
  const [formData, setFormData] = useState({ name: '', email: '', message: '' });
  const [formErrors, setFormErrors] = useState({});
  const [submitStatus, setSubmitStatus] = useState(null);
  const [isSubmitting, setIsSubmitting] = useState(false);

  useEffect(() => {
    const handleScroll = () => {
      const sections = ['hero', 'about', 'services', 'projects', 'contact'];
      const current = sections.find(section => {
        const element = document.getElementById(section);
        if (element) {
          const rect = element.getBoundingClientRect();
          return rect.top <= 100 && rect.bottom >= 100;
        }
        return false;
      });
      if (current) setActiveSection(current);
      setShowScrollTop(window.scrollY > 500);
    };
    window.addEventListener('scroll', handleScroll);
    return () => window.removeEventListener('scroll', handleScroll);
  }, []);

  const scrollToSection = (id) => {
    const element = document.getElementById(id);
    if (element) { element.scrollIntoView({ behavior: 'smooth' }); setIsMenuOpen(false); }
  };

  const scrollToTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });

  const validateForm = () => {
    const errors = {};
    if (!formData.name.trim()) errors.name = 'Imie jest wymagane';
    if (!formData.email.trim()) errors.email = 'Email jest wymagany';
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) errors.email = 'Podaj poprawny adres email';
    if (!formData.message.trim()) errors.message = 'Wiadomosc jest wymagana';
    else if (formData.message.trim().length < 10) errors.message = 'Wiadomosc musi miec minimum 10 znakow';
    return errors;
  };

  const handleInputChange = (e) => {
    const { name, value } = e.target;
    setFormData(prev => ({ ...prev, [name]: value }));
    if (formErrors[name]) setFormErrors(prev => ({ ...prev, [name]: '' }));
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    const errors = validateForm();
    if (Object.keys(errors).length > 0) { setFormErrors(errors); return; }
    setIsSubmitting(true); setSubmitStatus(null);
    try {
      await new Promise(resolve => setTimeout(resolve, 1500));
      setSubmitStatus('success');
      setFormData({ name: '', email: '', message: '' });
      setTimeout(() => setSubmitStatus(null), 5000);
    } catch (error) {
      setSubmitStatus('error');
    } finally {
      setIsSubmitting(false);
    }
  };

    position: 'fixed', top: 0, width: '100%',
    background: 'rgba(17,24,39,0.97)', backdropFilter: 'blur(8px)',
    zIndex: 50, borderBottom: '1px solid #1f2937'

    maxWidth: 1152, margin: '0 auto', padding: '16px 24px',
    display: 'flex', justifyContent: 'space-between', alignItems: 'center'
  };
  const logoBox = {
    width: 40, height: 40,
    background: 'linear-gradient(135deg, #8b5cf6, #ec4899)',
    borderRadius: 8, display: 'flex', alignItems: 'center',
    justifyContent: 'center', fontWeight: 700, fontSize: 18, flexShrink: 0

  };

                style: { background: 'none', border: 'none', cursor: 'pointer',

          React.createElement('h1', { style: { fontSize: 'clamp(2.5rem, 8vw, 5rem)', fontWeight: 800, marginBottom: 24, lineHeight: 1.1 } },
            'Cze\u015b\u0107, fajnie', React.createElement('br'), 'że wpad\u0142e\u015b!'

          React.createElement('p', { style: { color: '#9ca3af', textAlign: 'center', marginBottom: 64, fontSize: 18 } }, 'Wsparcie w email marketingu i marketing automation dla e-commerce'),
          React.createElement('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: 24 } },

              { emoji: '\uD83D\uDD01', title: 'Strategia', text: 'U\u0142adam komunikacj\u0119 emailow\u0105 w sp\u00f3jny system, kt\u00f3ry buduje relacje z klientami i wspiera d\u0142ugoterminowy wzrost marki.' },
              { emoji: '\u2699\uFE0F', title: 'Automatyzacje', text: 'Projektuj\u0119 sekwencje mailowe, kt\u00f3re dzia\u0142aj\u0105 automatycznie, oszcz\u0119dzaj\u0105 czas i zwi\u0119kszaj\u0105 wyniki sprzeda\u017cowe.' },

                React.createElement('div', { style: { fontSize: 32, marginBottom: 16 } }, emoji),

      React.createElement('section', { id: 'projects', style: { padding: '80px 24px', background: 'rgba(31,41,55,0.5)' } },
        React.createElement('div', { style: { maxWidth: 896, margin: '0 auto', textAlign: 'center' } },
          React.createElement('h2', { style: { fontSize: 'clamp(2rem, 5vw, 3rem)', fontWeight: 700, marginBottom: 24 } }, 'Moje projekty'),
          React.createElement('p', { style: { fontSize: 18, color: '#d1d5db', marginBottom: 16 } }, 'Do\u015bwiadczenie zdobywa\u0142em przy projektach z bran\u017cy beauty, fitness, digital products, moda oraz e-commerce.'),
          React.createElement('p', { style: { fontSize: 16, color: '#9ca3af', marginBottom: 48 } }, 'Tworzy\u0142em kampanie emailowe, sekwencje automatyczne, strategie komunikacji i tre\u015bci sprzeda\u017cowe dopasowane do r\u00f3\u017cnych grup odbiorc\u00f3w.'),
          React.createElement('a', {
            href: 'https://drive.google.com/drive/folders/14pxFI_bcEJdWADP3tlIlDfX7sMA3fiaT?usp=drive_link',
            target: '_blank', rel: 'noopener noreferrer',
            style: { ...btnPrimary, fontSize: 18, padding: '20px 40px' },
            onMouseOver: e => e.currentTarget.style.background='#7c3aed',
            onMouseOut: e => e.currentTarget.style.background='#8b5cf6'
          },
            React.createElement('span', null, 'Zobacz projekty'),
            React.createElement(ChevronRight, { size: 24 })
          ),
          React.createElement('p', { style: { marginTop: 16, fontSize: 13, color: '#6b7280' } }, 'Mailingi \u2022 Automatyzacje \u2022 Strategie \u2022 Copywriting')
        )
      ),

      React.createElement('section', { id: 'contact', style: { padding: '80px 24px' } },
        React.createElement('div', { style: { maxWidth: 896, margin: '0 auto' } },
          React.createElement('h2', { style: { fontSize: 'clamp(2rem, 5vw, 3rem)', fontWeight: 700, marginBottom: 24, textAlign: 'center' } }, 'Otwarty na wsp\u00f3\u0142prac\u0119'),
          React.createElement('p', { style: { fontSize: 18, color: '#d1d5db', marginBottom: 8, textAlign: 'center' } }, 'Je\u015bli szukasz wsparcia w email marketingu, marketing automation lub chcesz porozmawia\u0107 o mo\u017cliwo\u015bciach dzia\u0142ania, napisz do mnie.'),

          submitStatus === 'success' && React.createElement('div', { style: { marginBottom: 32, background: 'rgba(34,197,94,0.15)', border: '1px solid #22c55e', borderRadius: 8, padding: 16, display: 'flex', gap: 12, alignItems: 'center' } },

          ),
          submitStatus === 'error' && React.createElement('div', { style: { marginBottom: 32, background: 'rgba(239,68,68,0.15)', border: '1px solid #ef4444', borderRadius: 8, padding: 16, display: 'flex', gap: 12, alignItems: 'center' } },
